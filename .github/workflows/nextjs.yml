# CI: Build Next.js app (no static export – this app uses API routes + MySQL)
# For production, deploy to Vercel, Railway, or another Node host that supports APIs and MySQL.
name: Build Next.js

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx next build
        env:
          # Dummy env so build doesn’t fail (APIs use these at runtime only)
          MYSQL_HOST: localhost
          MYSQL_USER: root
          MYSQL_PASSWORD: ""
          MYSQL_DATABASE: portuhub
