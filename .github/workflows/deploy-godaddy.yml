# Publish to live site (domain on GoDaddy, hosting elsewhere)
#
# With "domain only" on GoDaddy you have no cPanel/FTP. Host your app on a
# service like Render (free tier), then point your GoDaddy domain there via DNS.
#
# 1. Host: Create a Web Service at https://render.com (connect this GitHub repo).
# 2. Get your deploy hook: Render Dashboard → Your Service → Settings → Deploy Hook.
# 3. Add secret in GitHub: Settings → Secrets → Actions → RENDER_DEPLOY_HOOK = that URL.
# 4. GoDaddy DNS: Add CNAME record (e.g. www → your-app.onrender.com) so the domain points to your host.

name: Publish to Live Site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy hook is set
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "::error::Add secret RENDER_DEPLOY_HOOK (Render → Your Service → Settings → Deploy Hook). Domain-only on GoDaddy = host on Render then point DNS there."
            exit 1
          fi
          echo "Deploy hook configured."

      - name: Trigger deploy on host (Render)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo ""
          echo "Deploy triggered. Check your host dashboard for build status."
