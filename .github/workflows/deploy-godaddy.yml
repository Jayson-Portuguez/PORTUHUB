# Publish to live site (GitHub Pages @ portuhub.shop)
# Every push to main builds and deploys so your commits go live automatically.

name: Publish to Live Site

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies and build
        run: |
          npm ci
          npm run build

      - name: Prepare static site for GitHub Pages
        run: |
          mkdir -p deploy/build
          cp -r public/build/* deploy/build/
          node -e "
          const fs = require('fs');
          const manifestPath = fs.existsSync('public/build/.vite/manifest.json')
            ? 'public/build/.vite/manifest.json'
            : 'public/build/manifest.json';
          const manifest = fs.existsSync(manifestPath)
            ? JSON.parse(fs.readFileSync(manifestPath, 'utf8'))
            : {};
          const entry = manifest['resources/js/app.js'] || manifest['resources/css/app.css'] || Object.values(manifest)[0];
          const base = '/';
          const js = entry && entry.file ? base + 'build/' + entry.file : '';
          const css = (entry && entry.css) ? entry.css.map(c => base + 'build/' + c) : [];
          const linkTags = css.map(c => '<link rel=\"stylesheet\" href=\"' + c + '\">').join('\n  ');
          const scriptTag = js ? '<script type=\"module\" src=\"' + js + '\"></script>' : '';
          const html = \`<!DOCTYPE html>
<html lang=\"en\">
<head>
  <meta charset=\"utf-8\">
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">
  <title>PortuHub</title>
  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">
  <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>
  <link href=\"https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\">
  <script src=\"https://cdn.jsdelivr.net/npm/sweetalert2@11\"></script>
  \${linkTags}
</head>
<body>
  <div id=\"app\"></div>
  \${scriptTag}
</body>
</html>\`;
          fs.writeFileSync('deploy/index.html', html);
          fs.writeFileSync('deploy/404.html', html);
          "
          cp public/logo.svg deploy/ 2>/dev/null || true
          cp public/favicon.ico deploy/ 2>/dev/null || true
          cp public/placeholder.svg deploy/ 2>/dev/null || true

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
