# Deploy PortuHub to GoDaddy (FTP)
# Add these secrets in GitHub: Settings → Secrets and variables → Actions
#   FTP_SERVER    - e.g. ftp.yourdomain.com or your GoDaddy FTP hostname
#   FTP_USERNAME  - your GoDaddy FTP username
#   FTP_PASSWORD  - your GoDaddy FTP password
#   FTP_REMOTE    - optional; remote path e.g. /public_html or / (default: /)

name: Deploy to GoDaddy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies and build
        run: |
          npm ci
          npm run build

      - name: Deploy to GoDaddy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE || '/' }}
          exclude: |
            **/.git*
            **/.github
            **/node_modules
            **/.env
            **/.env.*
            **/storage/logs/*
            **/storage/framework/cache/*
            **/storage/framework/sessions/*
            **/storage/framework/views/*
            **/.phpunit*
            **/tests
            **/vendor/bin
            **/*.md
