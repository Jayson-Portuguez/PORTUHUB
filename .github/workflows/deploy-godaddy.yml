# Deploy Next.js site to GitHub Pages and use your GoDaddy domain (portuhub.shop)
#
# GitHub Pages serves static files only. API routes and MySQL will not run here.
# Point your GoDaddy domain to GitHub Pages: add CNAME in GoDaddy DNS → your-username.github.io
#
name: Deploy to GitHub Pages (GoDaddy domain)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      # GitHub Pages is static-only; API routes and dynamic segments cannot be used with static export.
      - name: Remove API routes for static export
        run: rm -rf app/api

      - name: Build with Next.js (static export)
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
