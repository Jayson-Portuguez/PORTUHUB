# Deploy Next.js app and use your GoDaddy domain
#
# This workflow deploys to Vercel (supports Next.js, API routes, and custom domains).
# After deployment, add your GoDaddy domain in Vercel and point GoDaddy DNS to Vercel
# (see instructions below in the workflow and in DEPLOY-GODADDY.md).
#
name: Deploy to production (GoDaddy domain)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
